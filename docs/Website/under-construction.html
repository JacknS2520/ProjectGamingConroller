<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="This page is currently under construction." />
  <title>Under Construction</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .construction-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .construction-card {
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 1.1);
      padding: 3rem 2rem;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
      text-align: center;
    }

    .construction-card h1 {
      font-size: clamp(2rem, 2.5vw, 3rem);
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .construction-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.9;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .construction-card p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
      max-width: 500px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 999px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #60a5fa);
      border-radius: 999px;
      animation: progress 2s ease-in-out infinite;
    }

    @keyframes progress {
      0% { width: 30%; }
      50% { width: 70%; }
      100% { width: 30%; }
    }

    .contact-info {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.95rem;
      color: var(--muted);
    }

    .contact-info a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .contact-info a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="construction-container">
    <div class="construction-card">
      <div class="construction-icon">🔨</div>
      <h1>Under Construction</h1>
      <p>We're building something awesome! This page is currently under development and will be available soon.</p>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <p>Check back soon for updates and new features.</p>
    </div>
  </div>
</body>
</html>
